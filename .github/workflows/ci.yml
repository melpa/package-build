name: ci
on: [push, pull_request]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        package: [evil, magit, realgud, org-contacts, which-key-posframe]
    steps:
    - name: Checkout package-build
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        path: package-build
        fetch-depth: 1
        persist-credentials: false

    - name: Checkout melpa
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        path: melpa
        repository: melpa/melpa
        fetch-depth: 1
        persist-credentials: false

    - name: Install dependencies
      run: |
        sudo apt-get install emacs git mercurial texinfo imagemagick

    - name: Setup config path
      run: |
        echo "LOAD_PATH = $GITHUB_WORKSPACE/package-build" > melpa/config.mk

    - name: Build ${{ matrix.package }}
      run: |
        cd melpa
        make recipes/${{ matrix.package }}
